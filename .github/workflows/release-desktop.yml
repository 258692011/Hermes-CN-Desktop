# Build hermes-agent-cn-desktop installers and attach them to a GitHub
# Release. Triggers on tags matching `v*` (e.g. `v0.6.3`).
#
# Desktop release build runs in parallel for Windows, macOS, and Linux. Each job:
#   1. Installs Node + pnpm + Rust toolchain
#   2. Caches cargo registry and target dir
#   3. `pnpm install`
#   4. Stages the bundled dashboard frontend, bundled skills, bundled plugins,
#      and bundled Hermes-CN-Core runtime payload + manifest for the target platform.
#      macOS keeps the upstream signed zip opaque and verifies nested Mach-O
#      signatures before notarization.
#   5. Builds the Tauri release bundle. The HERMES_RUNTIME_UPDATE_*_DEFAULT
#      env vars are NOT set here; src/process/runtime.rs ships hardcoded
#      production fallbacks. Set them only if you fork the project and
#      want to point the auto-update at a different runtime release
#      pipeline.
#   6. tauri-action uploads .exe / .dmg / .deb / .AppImage to the GitHub Release
#      it creates on first run, or appends to an existing tag's release.
#   7. Extra portable (unzip-and-run) zip artifacts are packaged from the same
#      build output and uploaded alongside the installers: Windows collects
#      exe + resources from the cargo target dir; macOS staples the already
#      notarized .app and zips it with ditto. See docs/portable-mode.md.

name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to associate the build with (e.g. v0.6.3)"
        required: true
      bundled_runtime_tag:
        description: "Hermes-CN-Core runtime release tag to embed in desktop installers, or latest"
        default: "runtime-v0.18.2-cn.2"
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            runtime_platform: win32
            runtime_arch: x64
            bundles: nsis
          - runner: macos-14
            target: aarch64-apple-darwin
            runtime_platform: darwin
            runtime_arch: arm64
            bundles: dmg
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            runtime_platform: darwin
            runtime_arch: x64
            bundles: dmg
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            runtime_platform: linux
            runtime_arch: x64
            bundles: deb,appimage

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v3
        with:
          version: "9"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.runtime_platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # The Tauri sub-crate uses the project root as the manifest dir.
          workspaces: ". -> target"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Resolve bundled runtime manifest
        id: runtime_manifest
        shell: bash
        env:
          BUNDLED_RUNTIME_REPO: Eynzof/Hermes-CN-Core
          BUNDLED_RUNTIME_TAG: ${{ github.event.inputs.bundled_runtime_tag || 'runtime-v0.18.2-cn.2' }}
          RUNTIME_PLATFORM: ${{ matrix.runtime_platform }}
          RUNTIME_ARCH: ${{ matrix.runtime_arch }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          (async () => {
            const repo = process.env.BUNDLED_RUNTIME_REPO || "Eynzof/Hermes-CN-Core";
            const tag = process.env.BUNDLED_RUNTIME_TAG || "latest";
            const baseUrl = tag === "latest"
              ? `https://github.com/${repo}/releases/latest/download`
              : `https://github.com/${repo}/releases/download/${encodeURIComponent(tag)}`;
            const platform = process.env.RUNTIME_PLATFORM;
            const arch = process.env.RUNTIME_ARCH;
            const response = await fetch(`${baseUrl}/stable-${platform}-${arch}.json`, {
              headers: { "User-Agent": "hermes-agent-cn-desktop-release-workflow" },
            });
            if (!response.ok) {
              throw new Error(`manifest download failed: HTTP ${response.status}`);
            }
            const manifest = await response.json();
            if (!manifest.sourceCommit) {
              throw new Error("runtime manifest missing sourceCommit");
            }
            if (!manifest.sourceRepo) {
              throw new Error("runtime manifest missing sourceRepo");
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `source_repo=${manifest.sourceRepo}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `source_commit=${manifest.sourceCommit}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `runtime_version=${manifest.runtimeVersion}\n`);
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Checkout runtime source for dashboard assets
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.runtime_manifest.outputs.source_repo }}
          ref: ${{ steps.runtime_manifest.outputs.source_commit }}
          path: hermes-agent-cn-source

      - name: Stage bundled dashboard frontend
        run: node scripts/stage-dashboard-web-dist.mjs --source hermes-agent-cn-source

      - name: Stage bundled skills
        run: node scripts/stage-bundled-skills.mjs --source hermes-agent-cn-source

      - name: Stage bundled plugins
        run: node scripts/stage-bundled-plugins.mjs --source hermes-agent-cn-source

      - name: Stage bundled Hermes-CN-Core runtime
        shell: bash
        run: |
          args=(
            scripts/stage-bundled-runtime.mjs
            --repo "Eynzof/Hermes-CN-Core"
            --tag "${{ github.event.inputs.bundled_runtime_tag || 'runtime-v0.18.2-cn.2' }}"
            --platform "${{ matrix.runtime_platform }}"
            --arch "${{ matrix.runtime_arch }}"
          )
          node "${args[@]}"

      - name: Prepare macOS signing credentials
        if: matrix.runtime_platform == 'darwin'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_SIGNING_IDENTITY"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_PRIVATE_KEY"

          mkdir -p "$RUNNER_TEMP/appstoreconnect/private_keys"
          printf '%s\n' "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          chmod 600 "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"

          signing_keychain_password="$(uuidgen)"
          signing_keychain="$RUNNER_TEMP/hermes-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/hermes-apple-certificate.p12"

          security create-keychain -p "$signing_keychain_password" "$signing_keychain"
          security set-keychain-settings -lut 21600 "$signing_keychain"
          security unlock-keychain -p "$signing_keychain_password" "$signing_keychain"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$signing_keychain"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$signing_keychain_password" \
            "$signing_keychain"
          security list-keychains -d user -s "$signing_keychain" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$signing_keychain"

      - name: Verify bundled macOS runtime payload signatures
        if: matrix.runtime_platform == 'darwin'
        shell: bash
        run: scripts/verify-macos-runtime-payload.sh "static/bundled-runtime/hermes-agent-cn-runtime-${{ matrix.runtime_platform }}-${{ matrix.runtime_arch }}.zip"

      - name: Build + upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          # tauri-action looks up the tag from this input. On a push:tags
          # trigger it falls back to GITHUB_REF, but we pass it explicitly
          # so workflow_dispatch also works.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Hermes Agent 中文社区桌面版 ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            自动构建的 Hermes Agent 中文社区桌面版安装包。

            Windows 系统安装名称、安装目录和卸载注册表项使用英文名
            Hermes Agent CN Desktop，避免中文路径造成兼容性问题。

            安装包已内置来自 ${{ steps.runtime_manifest.outputs.source_repo }}
            ${{ steps.runtime_manifest.outputs.source_commit }} 的 Dashboard 前端、内置技能和内置插件。

            Windows、macOS 和 Linux 安装包同时内置 Hermes-CN-Core runtime
            ${{ steps.runtime_manifest.outputs.runtime_version }}，安装后可直接启动本地内核。

            Linux x64 版本提供 Debian 安装包（.deb）和免安装 AppImage。

            Windows 和 macOS 另附免安装（portable）压缩包：解压即用，全部数据保存在
            解压目录的 data 文件夹内，详见压缩包内 README-portable.txt。

            如需覆盖 runtime 更新源，可设置 HERMES_RUNTIME_UPDATE_* 环境变量。
          releaseDraft: false
          # Mark SemVer prerelease tags as prerelease on GitHub Releases.
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Package + upload Windows portable zip
        if: matrix.runtime_platform == 'win32'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          node scripts/package-portable-windows.mjs --target ${{ matrix.target }}
          gh release upload "$RELEASE_TAG" target/portable/*-portable.zip --clobber

      - name: Notarize, staple, verify, and reupload macOS DMG
        if: matrix.runtime_platform == 'darwin'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmgs=(target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "No macOS DMG bundle found" >&2
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            echo "Notarizing final DMG: $dmg"
            submit_json="$RUNNER_TEMP/notary-submit-$(basename "$dmg").json"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --output-format json | tee "$submit_json"

            submission_id="$(python3 - "$submit_json" <<'PY'
          import json, sys
          with open(sys.argv[1], "r", encoding="utf-8") as fh:
              print(json.load(fh).get("id", ""))
          PY
          )"
            submission_status="$(python3 - "$submit_json" <<'PY'
          import json, sys
          with open(sys.argv[1], "r", encoding="utf-8") as fh:
              print(json.load(fh).get("status", ""))
          PY
          )"

            if [ "$submission_status" != "Accepted" ]; then
              echo "Notarization failed with status: $submission_status" >&2
              if [ -n "$submission_id" ]; then
                xcrun notarytool log "$submission_id" \
                  --key "$APPLE_API_KEY_PATH" \
                  --key-id "$APPLE_API_KEY" \
                  --issuer "$APPLE_API_ISSUER" \
                  --output-format json | tee "$RUNNER_TEMP/notary-log-$submission_id.json" || true
              fi
              exit 1
            fi

            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            spctl -a -vvv -t open --context context:primary-signature "$dmg"

            # tauri-action already uploaded the first DMG. Replace it with the
            # final notarized + stapled DMG so the release asset is the one users download.
            gh release upload "$RELEASE_TAG" "$dmg" --clobber
          done

      - name: Package + upload macOS portable zip
        if: matrix.runtime_platform == 'darwin'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          app="target/${{ matrix.target }}/release/bundle/macos/Hermes Agent CN Desktop.app"

          # Tauri's updater bundler compresses the .app into the .app.tar.gz
          # updater artifact and then REMOVES the plain .app ("Cleaning …"),
          # so by the time this step runs the bundle dir may only hold the
          # tarball. Re-extract the .app from the final notarized DMG — the
          # exact bits users download, covered by the notarization ticket.
          if [ ! -d "$app" ]; then
            dmgs=(target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
            mnt="$(mktemp -d)"
            hdiutil attach "${dmgs[0]}" -mountpoint "$mnt" -nobrowse -quiet
            mkdir -p "$(dirname "$app")"
            ditto "$mnt/Hermes Agent CN Desktop.app" "$app"
            hdiutil detach "$mnt" -quiet
          fi

          # The DMG notarization above produced a ticket covering the nested
          # .app; staple the .app itself so the portable copy also validates
          # offline. If Apple's ticket lookup ever fails here, the fallback is
          # to notarize the portable zip separately:
          #   ditto -c -k --keepParent "$app" app.zip && xcrun notarytool submit app.zip ...
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"
          spctl -a -vvv --type exec "$app"

          node scripts/package-portable-macos.mjs --target ${{ matrix.target }}
          gh release upload "$RELEASE_TAG" target/portable/*-portable.zip --clobber

  # Mirror all release assets to Cloudflare R2 so the dl-desktop download
  # mirror (landing repo workers/release-mirror) serves from R2 instead of
  # proxying GitHub. Runs after every build leg finishes, i.e. after the
  # notarized DMG --clobber re-uploads and portable zips are final.
  #
  # Failure here never blocks the release: the mirror Worker falls back to
  # GitHub for any object missing from R2. Re-run this job from the Actions
  # UI after a failure — every step is idempotent.
  #
  # Required repo secrets (R2 API token scoped to the bucket, created in
  # Cloudflare Dashboard → R2 → Manage API Tokens):
  #   R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ACCOUNT_ID
  mirror-sync:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
      BUCKET: hermes-desktop-releases
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      # aws cli v2.23+ 默认的数据完整性校验头与 R2 不兼容,必须降级
      AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
    steps:
      - name: Download all release assets
        run: |
          mkdir -p assets && cd assets
          gh release download "$RELEASE_TAG" -R "$GITHUB_REPOSITORY"

      - name: Generate and upload checksums.txt
        run: |
          cd assets
          rm -f checksums.txt
          sha256sum * | sort -k2 > checksums.txt
          gh release upload "$RELEASE_TAG" checksums.txt -R "$GITHUB_REPOSITORY" --clobber

      - name: Sync assets to R2
        run: aws s3 sync assets/ "s3://$BUCKET/$RELEASE_TAG/"

      - name: Prune old versions from R2 (keep newest 5 tags)
        run: |
          aws s3 ls "s3://$BUCKET/" | awk '{print $2}' | tr -d '/' \
            | sort -V | head -n -5 | while read -r old; do
              [ -n "$old" ] && aws s3 rm "s3://$BUCKET/$old/" --recursive
            done
